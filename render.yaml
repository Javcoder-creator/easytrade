# render.yaml — Render.com Blueprint
# Bu fayl bilan 1 bosishda barcha servislar yaratiladi.

services:
  # ─── Backend API ───────────────────────────────────
  - type: web
    name: easytrade-backend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: easytrade-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # CORS: frontend manzili. Deploy dan keyin Dashboard → easytrade-frontend → URL ni nusxalab shu yerga kiriting.
      - key: CLIENT_URL
        sync: false

  # ─── Frontend (static site) ─────────────────────────
  - type: web
    name: easytrade-frontend
    runtime: static
    
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    # rootDir: client bo‘lganda path rootDir ga nisbatan
    staticPublishPath: dist
    envVars:
      # Backend public URL — client build vaqtida /api/v1 qo‘shiladi (axios.js)
      - key: VITE_API_URL
        fromService:
          name: easytrade-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ─── PostgreSQL Database ────────────────────────────
databases:
  - name: easytrade-db
    databaseName: easytrade_db
    region: frankfurt
    plan: free
